name: Run Stock Bot

on:
  schedule:
    # 매일 한국 시간 오전 8시 (UTC 기준 전날 23시 0분)에 자동 실행됩니다.
    - cron: '0 23 * * *'
  workflow_dispatch: # 수동으로 즉시 실행할 수 있는 버튼을 만듭니다.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 불러오기
      uses: actions/checkout@v4

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필요한 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 주식 봇 실행
      run: python stock_bot.py

    - name: 새 포스트를 깃허브에 저장(Commit) 및 반영(Push)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add _posts/
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-post: Daily Stock Market Scan" && git push)
