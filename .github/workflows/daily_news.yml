name: Daily News Post Bot  # 로봇의 이름

on:
  schedule:
    - cron: '0 0 * * *'    # [중요] 매일 한국 시간 오전 9시(UTC 0시)에 실행해라
  workflow_dispatch:      # [덤] 내가 원할 때 버튼을 눌러서 바로 실행하게 해라

jobs:
  build:
    runs-on: ubuntu-latest # 최신 가상 컴퓨터 하나를 빌려라
    steps:
      - uses: actions/checkout@v3 # 1. 내 블로그 파일들을 이 컴퓨터로 가져와라
      
      - name: Set up Python
        uses: actions/setup-python@v4 # 2. 이 컴퓨터에 파이썬을 설치해라
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install requests     # 3. 뉴스 가져오기에 필요한 도구(requests)를 깔아라
        
      - name: Run news bot
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }} # 4. 금고(Secrets)에서 아까 숨겨둔 열쇠를 꺼내라
        run: python news_bot.py      # 5. 우리가 만든 'news_bot.py'를 실행해라
        
      - name: Commit and Push
        run: |                       # 6. 새로 생긴 뉴스 파일을 내 블로그에 다시 올려라
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add _posts/*.md
          git commit -m "Add daily news for $(date +'%Y-%m-%d')" || exit 0
          git push
